          type: array
          items:
            type: string
          nullable: true
          description: Template:<br>[<br>"https://example.com",<br>"http://cloudblue.com/"<br>]
        websites:
          type: array
          items:
            type: string
          nullable: true
          description: Template:<br>[<br>"https://example.com",<br>"http://cloudblue.com/"<br>]
        industries:
          type: array
          items:
            $ref: '#/components/schemas/auth.Industry'
        public:
          type: boolean
          nullable: true
          description: Flag to show Account data in public CB catalog.
        events:
          type: object
          properties:
            created:
              type: object
              properties:
                at:
                  type: string
                  format: datetime
                by:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    icon:
                      type: string
            updated:
              type: object
              properties:
                at:
                  type: string
                  format: datetime
                by:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    icon:
                      type: string
          readOnly: true
        permissions:
          type: object
          readOnly: true
        groups:
          type: array
          items:
            $ref: '#/components/schemas/auth.GroupBase'
          readOnly: true
