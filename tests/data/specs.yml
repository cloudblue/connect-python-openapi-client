      properties:
        id:
          type: string
          readOnly: true
        instance_id:
          type: string
          maxLength: 30
        topic:
          type: string
          maxLength: 100
        type:
          type: string
          enum:
          - conversation
          - notes
          default: conversation
        status:
          type: string
          enum:
          - open
          - closed
          readOnly: true
          default: open
        events:
          type: object
          properties:
            created:
              type: object
              properties:
                at:
                  type: string
                  format: datetime
                by:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    icon:
